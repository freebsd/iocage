# This is a basic workflow to help you get started with Actions

name: pages

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  builddocs:
    name: get version from pyproject.toml and push docs to pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
      - name: Determine tag/version
        id: computed-tag
        run: |
          set -e
          TAG=$(cat pyproject.toml \
            | grep --extended-regexp "^version =" \
            | grep --extended-regexp --only-matching "[0-9]+\.[0-9]+" \
            | head --lines=1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - id: deployment
        uses: sphinx-notes/pages@v3
        with:
          sphinx_build_options: -b html -D version=${{ steps.computed-tag.outputs.tag }} -D release=${{ steps.computed-tag.outputs.tag }} -c ./doc/source
          documentation_path: ./doc/source
