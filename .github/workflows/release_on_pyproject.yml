---

name: Tag release if pyproject.toml version changed
on:
  push:
    branches:
      - master
jobs:
  collect:
    name: Tag master using pyproject.toml
    runs-on: ubuntu-latest
    outputs:
      tag_existed: ${{ steps.check-tag.outputs.exists }}
      tagged_version: ${{ steps.computed-tag.outputs.tag }}
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
      - name: Determine tag/version
        id: computed-tag
        run: |
          set -e
          TAG=$(cat pyproject.toml \
            | grep --extended-regexp "^version =" \
            | grep --extended-regexp --only-matching "[0-9]+\.[0-9]+" \
            | head --lines=1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - uses: mukunku/tag-exists-action@v1.7.0
        id: check-tag
        with:
          tag: ${{ steps.computed-tag.outputs.tag }}
      - name: Tag project based on pyproject (noop if exists)
        if: steps.check-tag.outputs.exists != 'true'
        uses: mathieudutour/github-tag-action@v6.2
        env:
          # node20 is deprecated, force node24 until
          # the action is updated (there is still a warning)
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.computed-tag.outputs.tag }}
          tag_prefix: ""
  release:
    needs: collect
    if: needs.collect.outputs.tag_existed != 'true'
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.collect.outputs.tagged_version }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
